services:
  # ── Combined API + Web (Node.js Web Service) ─────────────────────────────
  - type: web
    name: invoice-api
    runtime: node
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @invoice/db run build &&
      pnpm --filter @invoice/shared run build &&
      pnpm --filter @invoice/web run build &&
      pnpm --filter @invoice/api run build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        sync: false          # min 32 chars, set in Render dashboard
      - key: RESEND_API_KEY
        sync: false          # from resend.com, set in Render dashboard
      - key: RESEND_FROM
        sync: false          # e.g. noreply@yourdomain.com
