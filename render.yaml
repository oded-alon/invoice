services:
  # ── API (Node.js Web Service) ─────────────────────────────────────────────
  - type: web
    name: invoice-api
    runtime: node
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      npx prisma generate --schema packages/db/prisma/schema.prisma &&
      pnpm --filter @invoice/db run build &&
      pnpm --filter @invoice/shared run build &&
      pnpm --filter @invoice/api run build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        sync: false          # min 32 chars, set in Render dashboard
      - key: RESEND_API_KEY
        sync: false          # from resend.com, set in Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false          # comma-separated list, e.g. https://invoice-web.onrender.com

  # ── Web (Static Site) ─────────────────────────────────────────────────────
  - type: web
    name: invoice-web
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @invoice/web run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://invoice-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
