version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-il-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoice_il
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: invoice-il-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
